# Quick-start: run the published HappyPumi API image against Postgres with one command, so anyone can
# try the solution without building from source. See the README "Run the published container image".
#
#   docker compose up -d        # API at http://localhost:5118 with seeded demo data
#   docker compose down -v       # stop and wipe the database volume
#
# This brings up the API tier (the published image) and its database. Authentication here uses the Pulumi
# `token` scheme (ADR-0007): send `Authorization: token <anything>` and you are the seeded admin — that's
# what `pulumi login` and the curl examples use. (Use `Authorization: token role:member:alice` to act as a
# non-admin and test RBAC.) OIDC/Dex is NOT wired in this file; it's only needed for the console's browser
# sign-in. For the full console-with-login experience use `compose.full.yaml` (Linux) or `make dev`.
name: happypumi

services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: happypumidb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d happypumidb"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - happypumi-db:/var/lib/postgresql/data

  api:
    image: ghcr.io/viniciusmiguel/happypumi-api:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      # All state lives in Postgres (ADR-0005); the API applies its EF migration on startup.
      ConnectionStrings__happypumidb: "Host=db;Port=5432;Database=happypumidb;Username=postgres;Password=postgres"
      Seed__Enabled: "true"   # load demo orgs/stacks/registry/policy so there is data to explore
      AllowCorsAll: "true"    # dev-only: let a browser app on another origin call the API directly
    ports:
      - "5118:8080"           # API on http://localhost:5118 (matches the console's default HAPPYPUMI_URL)

volumes:
  happypumi-db:
