name: CI

# Unit + integration suites on every PR and push to main; a `v*` tag additionally
# publishes the versioned API container image to GHCR (see README "Versioning & releases").
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  # Pulumi CLI source revision built for the integration tests (clean-room black-box client, ADR-0008).
  PULUMI_REF: 'v3.140.0'

jobs:
  unit-tests:
    name: Unit / component tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      # Docker is preinstalled on the runner; the component suite spins up Postgres via Testcontainers
      # and boots the full Aspire topology (Postgres + Dex + API).
      - run: make test-unit

  integration-tests:
    name: CLI integration (real pulumi over HTTPS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout pulumi CLI source
        uses: actions/checkout@v4
        with:
          repository: pulumi/pulumi
          ref: ${{ env.PULUMI_REF }}
          path: .pulumi-src
      - name: Set up Go (matched to the pulumi checkout)
        uses: actions/setup-go@v5
        with:
          go-version-file: .pulumi-src/pkg/go.mod
          cache-dependency-path: .pulumi-src/pkg/go.sum
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Build pulumi CLI + Go language host
        run: make pulumi
        env:
          PULUMI_SRC: ${{ github.workspace }}/.pulumi-src
      - name: Trust the self-signed dev HTTPS certificate
        run: make certs
      - name: Integration tests
        run: make test-integration
        env:
          PULUMI_SRC: ${{ github.workspace }}/.pulumi-src

  publish:
    name: Publish container image
    needs: [unit-tests, integration-tests]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Derive image metadata (SemVer from the git tag)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/happypumi-api
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=edge,enable={{is_default_branch}}
      - name: Resolve assembly version (tag drops the leading v, else baseline)
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.1.0" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: HappyPumi.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
