name: CI

# Unit + integration suites on every PR and push to main; a `v*` tag additionally
# publishes the versioned API container image to GHCR (see README "Versioning & releases").
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  unit-tests:
    name: Unit / component tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      # The Aspire topology test asserts the API over the self-signed HTTPS dev cert, so the cert must be
      # created + trusted (DevCertTrust points SSL_CERT_DIR at the trust dir) before the suite runs.
      - run: make certs
      # Docker is preinstalled on the runner; the component suite spins up Postgres via Testcontainers
      # and boots the full Aspire topology (Postgres + Dex + API).
      - run: make test-unit

  integration-tests:
    name: CLI integration (real pulumi over HTTPS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: HappyPumi
    steps:
      - name: Checkout HappyPumi
        uses: actions/checkout@v4
        with:
          path: HappyPumi
      # Build the Apache-2.0 pulumi CLI from source (clean-room black-box client, ADR-0008). Resolve the
      # latest release dynamically rather than pinning. The CLI must live as a SIBLING of the repo: the
      # integration fixtures resolve the local SDK via a relative replace (../../../../pulumi/sdk).
      - name: Resolve latest pulumi release tag
        id: pulumi
        run: echo "ref=$(gh api repos/pulumi/pulumi/releases/latest --jq .tag_name)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Checkout pulumi CLI source (latest release, sibling of the repo)
        uses: actions/checkout@v4
        with:
          repository: pulumi/pulumi
          ref: ${{ steps.pulumi.outputs.ref }}
          path: pulumi
      - name: Set up Go (matched to the pulumi checkout)
        uses: actions/setup-go@v5
        with:
          go-version-file: pulumi/pkg/go.mod
          cache-dependency-path: pulumi/pkg/go.sum
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      # PULUMI_SRC defaults to ../pulumi relative to the repo, which now resolves to the sibling checkout.
      - name: Build pulumi CLI + Go language host
        run: make pulumi
      - name: Trust the self-signed dev HTTPS certificate
        run: make certs
      - name: Integration tests
        run: make test-integration

  publish:
    name: Publish container image
    needs: [unit-tests, integration-tests]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Derive image metadata (SemVer from the git tag)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/happypumi-api
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=edge,enable={{is_default_branch}}
      - name: Resolve assembly version (tag drops the leading v, else baseline)
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.1.0" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: HappyPumi.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
