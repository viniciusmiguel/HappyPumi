# Dex configuration for LOCAL DEVELOPMENT / TESTING ONLY (ADR-0007).
# A lightweight real OIDC provider so RBAC can be developed and tested against actual signed JWTs +
# JWKS, without standing up a heavy IdP. Users/groups are static and seeded here for reproducibility;
# `groups` map to HappyPumi RBAC roles. Do NOT use this config or these credentials in production.

# The issuer must match the URL clients use to reach Dex and the `iss` claim in tokens. The AppHost
# pins Dex to host port 5556 so this stays stable across runs.
issuer: http://localhost:5556/dex

storage:
  type: memory # ephemeral; fine for dev/test (state resets on restart)

web:
  http: 0.0.0.0:5556

oauth2:
  # Skip the approval screen so automated tests can complete the flow non-interactively.
  skipApprovalScreen: true

staticClients:
  - id: happypumi
    name: HappyPumi
    secret: happypumi-dev-secret
    redirectURIs:
      - http://localhost:8080/signin-oidc
      - http://localhost:5556/callback # device/CLI-style local callback for tests

enablePasswordDB: true

# Static users. The bcrypt hash below is Dex's canonical example hash for the password "password".
# group membership drives RBAC: happypumi-admins -> admin role, happypumi-members -> member role.
staticPasswords:
  - email: admin@happypumi.dev
    hash: "$2a$10$2b2cU8CPhOTaGrs1HRQuAueS7JTT5ZHsHSzYiFPm1leZck7Mc8T4i"
    username: admin
    userID: "08a8684b-db88-4b73-90a9-3cd1661f5466"
    groups:
      - happypumi-admins
  - email: member@happypumi.dev
    hash: "$2a$10$2b2cU8CPhOTaGrs1HRQuAueS7JTT5ZHsHSzYiFPm1leZck7Mc8T4i"
    username: member
    userID: "41331323-6f44-45e6-b3b9-2c4b60c02be5"
    groups:
      - happypumi-members
